name: Bug report
description: Report a reproducible bug in the offline evaluation lab.
title: "[bug] "
body:
  - type: dropdown
    id: area
    attributes:
      label: Contribution area
      description: Select the area that best matches this report.
      options:
        - Metrics
        - Synthetic scenarios
        - Routers and policies
        - Reports and charts
        - Adapters
        - Docs
    validations:
      required: true

  - type: textarea
    id: expected_actual
    attributes:
      label: Expected vs actual behavior
      description: Describe what you expected and what actually happened.
      placeholder: |
        Expected:
        Actual:
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide minimal, ordered steps.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: commands
    attributes:
      label: Commands run
      description: Include the exact commands and key output snippets.
      placeholder: |
        make test
        make evaluate
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      description: "Example: 3.12.7"
      placeholder: 3.12.x
    validations:
      required: true
