name: Bug report
description: Report a reproducible bug in the offline evaluation lab.
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping keep the lab reliable. Before filing, please search
        open issues for duplicates and avoid sharing private production data.
  - type: dropdown
    id: area
    attributes:
      label: Contribution area
      description: Select the area that best matches this report.
      options:
        - Metrics
        - Synthetic scenarios
        - Routers and policies
        - Reports and charts
        - Adapters
        - Docs
    validations:
      required: true
  - type: textarea
    id: expected_actual
    attributes:
      label: Expected vs actual behavior
      description: Describe what you expected and what actually happened.
      placeholder: |
        Expected:
        Actual:
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide minimal, ordered steps.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: commands
    attributes:
      label: Commands run
      description: Include the exact commands and key output snippets.
      placeholder: |
        make test
        make evaluate
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Which workflow is blocked or misleading?
      placeholder: This affects report generation, policy comparison, or contributor setup because...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, and package version or commit SHA.
      placeholder: Python 3.12 on Windows, commit abc123
    validations:
      required: true
