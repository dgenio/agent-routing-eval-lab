# 灵台未央工具目录
# 定义灵的工具及其成本、延迟、安全性等属性

tools:
  # 哲学分析模块
  - name: marvis.ling_ask_philosophy
    avg_cost: 0.15
    avg_latency_ms: 2000
    sensitive: false
    requires_approval: false
    description: 纯哲学分析：存在主义、斯多葛、尼采、维特根斯坦等18学派
    module: ling-philosophy

  # 心理学分析模块
  - name: marvis.ling_ask_psychology
    avg_cost: 0.15
    avg_latency_ms: 2000
    sensitive: false
    requires_approval: false
    description: 纯心理学分析：精神分析、CBT、人本等18学派
    module: ling-psychology

  # 综合分析模块
  - name: marvis.ling_ask_main
    avg_cost: 0.20
    avg_latency_ms: 2500
    sensitive: false
    requires_approval: false
    description: 三轴整合：哲学追问→心理学诊断→综合方案
    module: ling-main

  # 编码执行模块
  - name: codewhale.exec
    avg_cost: 0.25
    avg_latency_ms: 3000
    sensitive: true
    requires_approval: false
    description: 复杂编程任务：文件读写、Shell、Git
    module: codewhale

  # 直接回答（无工具调用）
  - name: direct.answer
    avg_cost: 0.01
    avg_latency_ms: 500
    sensitive: false
    requires_approval: false
    description: 直接回答简单问题，无需工具调用
    module: direct

  # 记忆检索
  - name: memory.search
    avg_cost: 0.02
    avg_latency_ms: 300
    sensitive: false
    requires_approval: false
    description: 语义搜索记忆库
    module: memory

  # 知识库检索
  - name: knowledge.search
    avg_cost: 0.02
    avg_latency_ms: 300
    sensitive: false
    requires_approval: false
    description: 语义搜索知识库
    module: knowledge

  # Web 搜索
  - name: web.search
    avg_cost: 0.05
    avg_latency_ms: 1500
    sensitive: false
    requires_approval: false
    description: 搜索互联网获取实时信息
    module: web

  # 文件操作
  - name: file.read
    avg_cost: 0.01
    avg_latency_ms: 100
    sensitive: false
    requires_approval: false
    description: 读取文件内容
    module: file

  - name: file.write
    avg_cost: 0.02
    avg_latency_ms: 200
    sensitive: true
    requires_approval: false
    description: 写入文件内容
    module: file

  # Shell 执行
  - name: shell.exec
    avg_cost: 0.10
    avg_latency_ms: 1000
    sensitive: true
    requires_approval: true
    description: 执行 Shell 命令
    module: shell
