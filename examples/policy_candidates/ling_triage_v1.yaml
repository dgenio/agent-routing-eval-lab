# 灵台未央三轴分析路由器 v1.0
# 基于规则的意图识别和工具选择

name: ling_triage_v1
description: 灵台未央三轴分析路由器，基于关键词和模式匹配的意图识别
version: "1.0"
author: 灵台未央

# 路由策略配置
strategy:
  type: rule_based
  confidence_threshold: 0.3
  default_tool: direct.answer

# 意图权重
intent_weights:
  philosophy_analysis: 10
  psychology_analysis: 10
  integrated_analysis: 15
  coding_task: 8
  memory_recall: 5
  knowledge_search: 4
  web_search: 3
  file_operation: 2
  shell_execution: 1

# 工具映射
tool_mapping:
  philosophy_analysis: marvis.ling_ask_philosophy
  psychology_analysis: marvis.ling_ask_psychology
  integrated_analysis: marvis.ling_ask_main
  coding_task: codewhale.exec
  memory_recall: memory.search
  knowledge_search: knowledge.search
  web_search: web.search
  file_operation: file.read
  shell_execution: shell.exec
  direct_answer: direct.answer

# 替代工具（当首选工具不可用时）
alternatives:
  marvis.ling_ask_philosophy:
    - marvis.ling_ask_main
    - direct.answer
  marvis.ling_ask_psychology:
    - marvis.ling_ask_main
    - direct.answer
  marvis.ling_ask_main:
    - marvis.ling_ask_philosophy
    - marvis.ling_ask_psychology
    - direct.answer
  codewhale.exec:
    - direct.answer
  memory.search:
    - knowledge.search
    - direct.answer
  knowledge.search:
    - memory.search
    - direct.answer
  web.search:
    - direct.answer
  file.read:
    - direct.answer
  shell.exec:
    - direct.answer

# 关键词配置
keywords:
  philosophy:
    - 哲学
    - 存在主义
    - 斯多葛
    - 尼采
    - 维特根斯坦
    - 伦理
    - 道德
    - 意义
    - 荒谬
    - 自由
    - 责任
    - 正义
    - 真理
    - 认识论
    - 本体论
    - 形而上学
    - 逻辑
    - 美学
    - 宗教哲学
    - 政治哲学

  psychology:
    - 心理
    - 精神分析
    - 弗洛伊德
    - 荣格
    - 认知
    - 行为
    - CBT
    - 人本
    - 马斯洛
    - 罗杰斯
    - 依恋
    - 创伤
    - 抑郁
    - 焦虑
    - 人格
    - 发展
    - 社会心理
    - 临床
    - 治疗
    - 咨询

  coding:
    - 代码
    - 编程
    - 函数
    - 类
    - 模块
    - API
    - 数据库
    - 算法
    - bug
    - 调试
    - 重构
    - 测试
    - 部署
    - Git
    - 脚本
    - 程序

# 模式配置
patterns:
  philosophy:
    - "什么是.*的意义"
    - "从哲学角度.*分析"
    - ".*的哲学.*是什么"
    - "如何理解.*的.*本质"
    - ".*伦理.*问题"

  psychology:
    - "从心理学角度.*分析"
    - ".*心理.*问题"
    - "如何.*治疗.*"
    - ".*的.*心理.*机制"
    - ".*是什么.*心理.*障碍"

  integrated:
    - "从.*多个.*角度.*分析"
    - "综合.*哲学.*心理.*分析"
    - "全面.*分析.*问题"
    - "深度.*分析.*"

  coding:
    - "写.*代码"
    - "实现.*函数"
    - "修复.*bug"
    - "创建.*脚本"
    - ".*怎么.*编程"
    - "用.*代码.*实现"
